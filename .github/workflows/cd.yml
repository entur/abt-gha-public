name: CD

on:
  workflow_call:
    inputs:
      environment:
        description: Environment to deploy to (dev/tst/prd)
        required: true
        type: string
      image:
        description: Docker image to deploy (image_name:image_tag)
        required: true
        type: string
      channel-id:
        description: Slack channel ID for deployment notifications
        required: true
        type: string
      container-name:
        description: "Replace the image of a named container in the common.containers array. Resolves the array index automatically using the container name in values.yaml"
        required: false
        type: string
        default: ""
      notify-changelog:
        description: Whether to post a changelog Slack notification on deployment
        required: false
        type: boolean
        default: true

jobs:
  git-diff-url:
    name: Git Diff URL
    runs-on: ubuntu-latest
    permissions:
      deployments: read
    outputs:
      compare_url: ${{ steps.compare.outputs.compare_url }}
      short_sha: ${{ steps.compare.outputs.short_sha }}
    steps:
      - name: Get compare URL since last successful deployment
        id: compare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEPLOYED_SHA=$(
            gh api "repos/${{ github.repository }}/deployments" \
              -X GET \
              -f environment="${{ inputs.environment }}" \
              -f per_page=20 \
              --jq '.[] | "\(.sha) \(.statuses_url)"' | \
            while IFS=' ' read -r sha statuses_url; do
              state=$(gh api "$statuses_url" --jq '.[0].state // empty' 2>/dev/null)
              if [ "$state" = "success" ]; then
                echo "$sha"
                break
              fi
            done
          )

          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

          if [ -n "$DEPLOYED_SHA" ]; then
            URL="https://github.com/${{ github.repository }}/compare/${DEPLOYED_SHA}...${{ github.sha }}"
            echo "compare_url=$URL" >> $GITHUB_OUTPUT
            echo "$URL"
          else
            echo "No previous successful deployment found for ${{ inputs.environment }}"
          fi

  notify-diff:
    name: Notify Git Diff
    needs: git-diff-url
    if: inputs.notify-changelog && needs.git-diff-url.outputs.compare_url != ''
    uses: entur/gha-slack/.github/workflows/post.yml@v2
    with:
      channel_id: ${{ inputs.channel-id }}
      message: "📋 New <${{ needs.git-diff-url.outputs.compare_url }}|changelog> for ${{ github.event.repository.name }} ${{ needs.git-diff-url.outputs.short_sha }} in ${{ inputs.environment }}"
    secrets: inherit

  tf-plan:
    name: Terraform Plan
    uses: entur/gha-terraform/.github/workflows/plan.yml@v2
    with:
      environment: ${{ inputs.environment }}
    secrets: inherit

  tf-apply:
    name: Terraform Apply
    needs: [tf-plan]
    concurrency:
      group: cd-deploy-${{ inputs.environment }}-${{ github.repository }}
      cancel-in-progress: false
    uses: entur/gha-terraform/.github/workflows/apply.yml@v2
    with:
      environment: ${{ inputs.environment }}
      has_changes: ${{ needs.tf-plan.outputs.has_changes }}
    secrets: inherit

  deploy:
    name: Deploy
    needs: [tf-apply]
    # Terraform apply is skipped on empty plan. This if ensures that job is run even if previous step is skipped
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    concurrency:
      group: cd-deploy-${{ inputs.environment }}-${{ github.repository }}
      cancel-in-progress: false
    uses: entur/gha-helm/.github/workflows/deploy.yml@v1
    with:
      environment: ${{ inputs.environment }}
      image: ${{ inputs.image }}
      slack_channel_id: ${{ inputs.channel-id }}
      container_name: ${{ inputs.container-name }}
    secrets: inherit
