name: Docker Build Publish
on:
  workflow_call:
    inputs:
      dry-run:
        description: If true, perform all actions apart from publish
        required: false
        type: string
        default: false
      channel-id:
        description: "Slack channel-id to post notification to"
        required: false
        type: string
        default: ${{ vars.channel_id || 'NO_ID'}}
      build_artifact_path:
        description: Path to the build artifact directory
        required: false
        type: string
        default: build/libs/
      build_args:
        description: Docker build arguments (newline-separated KEY=VALUE pairs)
        required: false
        type: string
        default: ''
    outputs:
      image_name:
        description: "Name of the Docker image pushed to the registry "
        value: ${{ jobs.docker-push.outputs.image_name }}
      image_tag:
        description: "Tag of the Docker image pushed to the registry"
        value: ${{ jobs.docker-push.outputs.image_tag }}

jobs:
  docker-build:
    uses: entur/gha-docker/.github/workflows/build.yml@v1
    with:
      build_artifact_name: app
      build_artifact_path: ${{ inputs.build_artifact_path }}
      build_args: ${{ inputs.build_args }}

  docker-scan:
    needs: docker-build
    uses: entur/gha-security/.github/workflows/docker-scan.yml@v2
    with:
      image_artifact: ${{ needs.docker-build.outputs.image_artifact }}

  docker-push:
    needs: docker-scan
    if: inputs.dry-run == 'false'
    uses: entur/gha-docker/.github/workflows/push.yml@v1

  post-success-to-slack:
    needs: docker-push
    if: success() && inputs.channel-id != 'NO_ID'
    uses: entur/gha-slack/.github/workflows/post.yml@v2
    with:
      channel_id: ${{ inputs.channel-id }}
      message: "🟢 Image deploy success, requested by ${{ github.actor }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
    secrets: inherit

  step-summary-info-success:
    needs: docker-push
    if: success()
    runs-on: ubuntu-24.04
    steps:
      - run: |
          echo "Image successfully deployed to docker repos" >> $GITHUB_STEP_SUMMARY

  post-failure-to-slack:
    needs: docker-push
    if: failure() && inputs.channel-id != 'NO_ID'
    uses: entur/gha-slack/.github/workflows/post.yml@v2
    with:
      channel_id: ${{ inputs.channel-id }}
      message: "🔴 Image deploy failed, requested by ${{ github.actor }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
    secrets: inherit
