name: Trigger Missed Dependabot Deploy
# When dependabot PRs are auto-merged via `gh pr merge --auto`, the resulting
# push on main is attributed to GITHUB_TOKEN and does not trigger downstream
# workflows. This workflow inspects the latest commit on a ref and, if it is a
# dependabot commit with no run of the target deploy workflow, dispatches it.
on:
  workflow_call:
    inputs:
      target-workflow:
        description: "Workflow filename to dispatch when a missed deploy is detected (e.g. deploy-main.yml)."
        required: true
        type: string
      target-ref:
        description: "Ref to inspect and dispatch the target workflow against."
        required: false
        type: string
        default: main
      dry-run:
        description: "When true, the workflow reports what it would do but does not dispatch."
        required: false
        type: boolean
        default: false
      channel-id:
        description: "Slack channel-id to post notification to"
        required: false
        type: string
        default: ${{ vars.channel_id || 'NO_ID'}}

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    outputs:
      dispatched: ${{ steps.inspect.outputs.dispatched }}
      sha: ${{ steps.inspect.outputs.sha }}
      commits: ${{ steps.inspect.outputs.commits }}
    steps:
      - name: Inspect latest commit and dispatch if needed
        id: inspect
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF: ${{ inputs.target-ref }}
          TARGET_WORKFLOW: ${{ inputs.target-workflow }}
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail

          SHA=$(gh api "repos/${REPO}/commits/${REF}" --jq '.sha')
          AUTHOR=$(gh api "repos/${REPO}/commits/${SHA}" --jq '.author.login // ""')
          echo "Latest commit on ${REF}: ${SHA} (author: ${AUTHOR:-unknown})" >> $GITHUB_STEP_SUMMARY
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

          if [ "$AUTHOR" != "dependabot[bot]" ]; then
            echo "Latest commit is not from dependabot; nothing to do." >> $GITHUB_STEP_SUMMARY
            echo "dispatched=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          RUNS=$(gh api "repos/${REPO}/actions/workflows/${TARGET_WORKFLOW}/runs?head_sha=${SHA}&per_page=1" --jq '.total_count')
          echo "Existing runs of ${TARGET_WORKFLOW} for ${SHA}: ${RUNS}" >> $GITHUB_STEP_SUMMARY

          if [ "$RUNS" -gt 0 ]; then
            echo "Target workflow has already run for ${SHA}; nothing to do." >> $GITHUB_STEP_SUMMARY
            echo "dispatched=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Bound the deployed range by the head_sha of the last successful target-workflow run
          # on this ref. Falls back to the head commit alone when there is no prior run.
          LAST_DEPLOYED_SHA=$(gh api "repos/${REPO}/actions/workflows/${TARGET_WORKFLOW}/runs?per_page=1&status=success&branch=${REF}" --jq '.workflow_runs[0].head_sha // ""')

          if [ -n "$LAST_DEPLOYED_SHA" ] && [ "$LAST_DEPLOYED_SHA" != "$SHA" ]; then
            COMMITS=$(gh api "repos/${REPO}/compare/${LAST_DEPLOYED_SHA}...${SHA}" --jq '
              [.commits
               | reverse
               | reduce .[] as $c (
                   {done: false, result: []};
                   if .done then .
                   elif ($c.author.login == "dependabot[bot]") then
                     .result += [$c]
                   else
                     {done: true, result: .result}
                   end
                 )
               | .result
               | reverse
               | .[]
               | .commit.message
               | split("\n")[0]
               | if test("\\(#[0-9]+\\)$") then
                   capture("(?<subject>.+) \\(#(?<pr>[0-9]+)\\)$")
                   | "* \(.subject) (<https://github.com/'"${REPO}"'/pull/\(.pr)|#\(.pr)>)"
                 else
                   "* \(.)"
                 end
              ] | join("\n")
            ')
          else
            COMMITS=$(gh api "repos/${REPO}/commits/${SHA}" --jq '
              .commit.message
              | split("\n")[0]
              | if test("\\(#[0-9]+\\)$") then
                  capture("(?<subject>.+) \\(#(?<pr>[0-9]+)\\)$")
                  | "* \(.subject) (<https://github.com/'"${REPO}"'/pull/\(.pr)|#\(.pr)>)"
                else
                  "* \(.)"
                end
            ')
          fi

          {
            echo "commits<<COMMITS_EOF"
            echo "$COMMITS"
            echo "COMMITS_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "## Missed deploy detected" >> $GITHUB_STEP_SUMMARY
          echo "- Ref: \`${REF}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${SHA}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Target workflow: \`${TARGET_WORKFLOW}\`" >> $GITHUB_STEP_SUMMARY

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry-run: would dispatch \`${TARGET_WORKFLOW}\` on \`${REF}\`." >> $GITHUB_STEP_SUMMARY
            echo "dispatched=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          gh workflow run "${TARGET_WORKFLOW}" --repo "${REPO}" --ref "${REF}"
          echo "Dispatched \`${TARGET_WORKFLOW}\` on \`${REF}\`." >> $GITHUB_STEP_SUMMARY
          echo "dispatched=true" >> $GITHUB_OUTPUT

  post-to-slack-if-dispatched:
    needs: check-and-trigger
    if: success() && needs.check-and-trigger.outputs.dispatched == 'true' && inputs.channel-id != 'NO_ID'
    uses: entur/gha-slack/.github/workflows/post.yml@v3.1.2
    with:
      channel_id: ${{ inputs.channel-id }}
      message: |
        🔵 ${{ github.repository }} - Triggered dependabot deploy on ${{ inputs.target-ref }}
        ${{ needs.check-and-trigger.outputs.commits }}
    secrets: inherit

  post-fail-to-slack-if-fail:
    needs: check-and-trigger
    if: failure() && inputs.channel-id != 'NO_ID'
    uses: entur/gha-slack/.github/workflows/post.yml@v3.1.2
    with:
      channel_id: ${{ inputs.channel-id }}
      message: "⚫ ${{ github.repository }} - Trigger missed dependabot deploy failed on ${{ inputs.target-ref }}"
    secrets: inherit
