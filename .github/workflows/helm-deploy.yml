name: Deploy

on:
  workflow_call:
    inputs:
      channel-id:
        description: Slack channel ID for deployment notifications
        required: true
        type: string
      environment:
        description: Environment to deploy to (dev/tst/prd).
        required: true
        type: string
      image:
        description: Docker image tag to deploy (image_name:image_tag)
        required: true
        type: string
      image-set-path:
        description: Comma-separated Helm values path(s) for the container image. See gha-helm deploy.yml for details.
        required: false
        type: string

concurrency:
  group: helm-deploy-${{ inputs.environment }}-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    uses: entur/gha-helm/.github/workflows/deploy.yml@v1
    with:
      environment: ${{ inputs.environment }}
      slack_channel_id: ${{ inputs.channel-id }}
      image: ${{ inputs.image }}
      image_set_path: ${{ inputs.image-set-path }}
    secrets: inherit
