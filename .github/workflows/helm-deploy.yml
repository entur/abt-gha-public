# Reusable helm deploy workflow — deploys a pre-built Docker image to a single environment
# (dev, tst, or prd) via gha-helm. One environment per call; callers sequence multiple calls.
# Callers handle building and pass the image reference as an input.
#
# Concurrency:
#   - Workflow-level: cancel-in-progress: false ensures a running deploy is never
#     interrupted. GitHub automatically drops older queued runs, keeping only the
#     latest — so you get at most 1 active + 1 queued run per branch.
#   - Deploy jobs use cancel-in-progress: false (never cancel an in-progress deploy)

name: Deploy

on:
  workflow_call:
    inputs:
      channel-id:
        description: Slack channel ID for deployment notifications
        required: true
        type: string
      environment:
        description: Environment to deploy to (dev/tst/prd).
        required: true
        type: string
      image:
        description: Docker image tag to deploy (image_name:image_tag)
        required: true
        type: string

concurrency:
  group: cd-deploy-${{ inputs.environment }}-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    uses: entur/gha-helm/.github/workflows/deploy.yml@v1
    with:
      environment: ${{ inputs.environment }}
      slack_channel_id: ${{ inputs.channel-id }}
      image: ${{ inputs.image }}
    secrets: inherit
