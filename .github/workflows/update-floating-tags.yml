name: Update floating tags

on:
  push:
    tags:
      - "v*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to use as source (e.g. v1.0)"
        required: true

jobs:
  update-tags:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update floating tags
        uses: actions/publish-action@v0.4.0
        with:
          source-tag: ${{ github.event.inputs.tag || github.ref_name }}
